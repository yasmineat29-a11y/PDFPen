
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spec Matcher Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .match { background: #e8f5e9; padding: 10px; margin: 8px 0; border-radius: 6px; border-left: 4px solid #4caf50; font-size: 13px; }
        .context { display: block; font-style: italic; color: #555; margin-top: 4px; font-size: 12px; }
        .page-tag { font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>
<div class="container">
    <h2>Spec Matcher</h2>
    <input type="file" id="pdfUpload" accept="application/pdf">
    <div id="results"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const TARGETS = ["Scope", "Material", "Installation", "Warranty", "Compliance"];

    document.getElementById('pdfUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const resultsDiv = document.getElementById('results');
        if (!file) return;

        resultsDiv.innerHTML = "Analyzing...";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            let htmlOutput = "<h3>Found Clauses:</h3>";
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(s => s.str).join(" ");
                
                TARGETS.forEach(t => {
                    const regex = new RegExp(t, 'gi');
                    let match;
                    // Find all occurrences on this page
                    while ((match = regex.exec(text)) !== null) {
                        // Extract a snippet of text (50 chars after the match)
                        const snippet = text.substring(match.index, match.index + 60).replace(/[<>]/g, "");
                        htmlOutput += `
                            <div class="match">
                                <strong>${t}</strong> <span class="page-tag">(Page ${i})</span>
                                <span class="context">...${snippet}...</span>
                            </div>`;
                    }
                });
            }
            resultsDiv.innerHTML = htmlOutput;
        } catch (err) {
            resultsDiv.innerHTML = `<div style="color:red">Error: ${err.message}</div>`;
        }
    });
</script>
</body>
</html>
