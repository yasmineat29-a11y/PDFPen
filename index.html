<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spec Matcher</title>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input { width: 100%; margin: 15px 0; }
        .match { background: #d1e7dd; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .error { color: red; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Spec Matcher</h2>
    <input type="file" id="pdfUpload" accept="application/pdf">
    <div id="results"></div>
</div>

<script>
    // Set the worker specifically to the same version as the library
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    const TARGETS = ["Scope", "Material", "Installation", "Warranty", "Compliance"];

    document.getElementById('pdfUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const resultsDiv = document.getElementById('results');
        if (!file) return;

        resultsDiv.innerHTML = "Processing...";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            let found = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const text = textContent.items.map(s => s.str).join(" ");
                
                TARGETS.forEach(t => {
                    if (new RegExp(t, 'i').test(text)) {
                        found.push(`<div>✅ ${t} (Page ${i})</div>`);
                    }
                });
            }
            resultsDiv.innerHTML = found.length > 0 ? found.join('') : "No matches found.";
        } catch (err) {
            resultsDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
    });
</script>
</body>
</html>
